<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - MONITOR Wing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #06060a;
            color: #e0e0ec;
            overflow: hidden;
        }

        .app-container {
            width: 1280px;
            height: 800px;
            display: flex;
            background: #06060a;
        }

        /* Sidebar */
        .sidebar {
            width: 48px;
            height: 100%;
            background: #0a0a10;
            border-right: 1px solid #1e1e2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 8px;
        }

        .nav-item {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            color: #9090aa;
            font-size: 16px;
        }

        .nav-item:hover {
            background: rgba(68, 214, 44, 0.1);
            color: #44D62C;
        }

        .nav-item.active {
            background: rgba(68, 214, 44, 0.15);
            color: #44D62C;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: #44D62C;
            border-radius: 2px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #06060a;
        }

        /* Titlebar */
        .titlebar {
            height: 32px;
            background: #0a0a10;
            border-bottom: 1px solid #1e1e2e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .app-title {
            color: #44D62C;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .window-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .window-btn:hover {
            opacity: 0.8;
        }

        .window-btn.minimize { background: #f59e0b; }
        .window-btn.maximize { background: #22c55e; }
        .window-btn.close { background: #ef4444; }

        /* Content Area */
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Glass Panel */
        .glass-panel {
            background: rgba(10, 10, 16, 0.8);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(30, 30, 46, 0.5);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(68, 214, 44, 0.3), 
                transparent
            );
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* KPI Cards */
        .kpi-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .kpi-card {
            flex: 1;
            height: 96px;
            background: rgba(10, 10, 16, 0.8);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(30, 30, 46, 0.5);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .kpi-card:hover {
            border-color: rgba(68, 214, 44, 0.3);
            box-shadow: 0 0 20px rgba(68, 214, 44, 0.1);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(68, 214, 44, 0.2), 
                transparent
            );
        }

        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .kpi-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(68, 214, 44, 0.8);
        }

        .kpi-icon {
            font-size: 16px;
            color: rgba(68, 214, 44, 0.3);
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: #e0e0ec;
            font-family: 'Courier New', monospace;
            line-height: 1;
        }

        .kpi-unit {
            font-size: 16px;
            color: #9090aa;
            font-family: 'Courier New', monospace;
            margin-left: 4px;
        }

        .kpi-subtitle {
            font-size: 10px;
            color: #6b6b82;
            margin-top: 4px;
        }

        .kpi-sparkline {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 40px;
            height: 20px;
            opacity: 0.3;
        }

        /* Timeline Graph */
        .timeline-container {
            flex: 1;
            min-height: 400px;
            background: rgba(10, 10, 16, 0.8);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(30, 30, 46, 0.5);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .timeline-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(68, 214, 44, 0.8);
        }

        .timeline-legend {
            display: flex;
            gap: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: #9090aa;
        }

        .legend-color {
            width: 8px;
            height: 2px;
            border-radius: 1px;
        }

        .legend-color.cpu { background: #44D62C; }
        .legend-color.gpu { background: #f59e0b; }
        .legend-color.fps { background: #22c55e; }

        .graph-canvas {
            width: 100%;
            height: 320px;
            background: rgba(6, 6, 10, 0.5);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(30, 30, 46, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 30, 46, 0.2) 1px, transparent 1px);
            background-size: 40px 32px;
        }

        .graph-line {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: currentColor;
            opacity: 0.8;
            border-radius: 1px;
        }

        .cpu-line {
            color: #44D62C;
            height: 60%;
            animation: pulse 2s ease-in-out infinite;
        }

        .gpu-line {
            color: #f59e0b;
            height: 45%;
            animation: pulse 2s ease-in-out infinite 0.5s;
        }

        .fps-line {
            color: #22c55e;
            height: 80%;
            animation: pulse 2s ease-in-out infinite 1s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Frame Time Section */
        .frame-time-panel {
            background: rgba(10, 10, 16, 0.8);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(30, 30, 46, 0.5);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .frame-time-info {
            display: flex;
            gap: 24px;
        }

        .frame-time-stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .frame-time-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6b6b82;
        }

        .frame-time-value {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0ec;
            font-family: 'Courier New', monospace;
        }

        .monitor-btn {
            background: rgba(68, 214, 44, 0.1);
            border: 1px solid #44D62C;
            color: #44D62C;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .monitor-btn:hover {
            background: rgba(68, 214, 44, 0.2);
            box-shadow: 0 0 10px rgba(68, 214, 44, 0.3);
        }

        .monitor-btn.active {
            background: #44D62C;
            color: #06060a;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .section-icon {
            color: rgba(68, 214, 44, 0.6);
            font-size: 16px;
        }

        .section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(68, 214, 44, 0.8);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="nav-item">⊙</div>
            <div class="nav-item">⚡</div>
            <div class="nav-item active">📊</div>
            <div class="nav-item">📋</div>
            <div class="nav-item">⚙</div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Titlebar -->
            <div class="titlebar">
                <div class="app-title">NEXUS</div>
                <div class="window-controls">
                    <div class="window-btn minimize"></div>
                    <div class="window-btn maximize"></div>
                    <div class="window-btn close"></div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content">
                <!-- KPI Row -->
                <div class="kpi-row">
                    <div class="kpi-card">
                        <div class="kpi-header">
                            <div class="kpi-label">CPU</div>
                            <div class="kpi-icon">⚡</div>
                        </div>
                        <div>
                            <span class="kpi-value">45<span class="kpi-unit">%</span></span>
                            <div class="kpi-subtitle">62°C • 3.8GHz</div>
                        </div>
                        <svg class="kpi-sparkline" viewBox="0 0 40 20">
                            <polyline points="0,15 5,12 10,14 15,8 20,10 25,6 30,9 35,7 40,11" 
                                      stroke="#44D62C" stroke-width="1" fill="none" opacity="0.5"/>
                        </svg>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-header">
                            <div class="kpi-label">GPU</div>
                            <div class="kpi-icon">🎮</div>
                        </div>
                        <div>
                            <span class="kpi-value">30<span class="kpi-unit">%</span></span>
                            <div class="kpi-subtitle">58°C • 1.8GHz</div>
                        </div>
                        <svg class="kpi-sparkline" viewBox="0 0 40 20">
                            <polyline points="0,12 5,10 10,13 15,11 20,8 25,10 30,7 35,9 40,6" 
                                      stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.5"/>
                        </svg>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-header">
                            <div class="kpi-label">MEM</div>
                            <div class="kpi-icon">💾</div>
                        </div>
                        <div>
                            <span class="kpi-value">6.2<span class="kpi-unit">GB</span></span>
                            <div class="kpi-subtitle">16GB total • 39%</div>
                        </div>
                        <div style="width: 100%; height: 4px; background: rgba(30,30,46,0.5); border-radius: 2px; margin-top: 8px;">
                            <div style="width: 39%; height: 100%; background: #44D62C; border-radius: 2px;"></div>
                        </div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-header">
                            <div class="kpi-label">FPS</div>
                            <div class="kpi-icon">📈</div>
                        </div>
                        <div>
                            <span class="kpi-value">144<span class="kpi-unit">fps</span></span>
                            <div class="kpi-subtitle">1% Low: 98</div>
                        </div>
                        <svg class="kpi-sparkline" viewBox="0 0 40 20">
                            <polyline points="0,8 5,6 10,7 15,5 20,4 25,6 30,5 35,4 40,3" 
                                      stroke="#22c55e" stroke-width="1" fill="none" opacity="0.5"/>
                        </svg>
                    </div>
                </div>

                <!-- Timeline Graph -->
                <div class="timeline-container">
                    <div class="timeline-header">
                        <div class="section-header">
                            <span class="section-icon">📊</span>
                            <span class="section-title">パフォーマンス時系列</span>
                        </div>
                        <div class="timeline-legend">
                            <div class="legend-item">
                                <div class="legend-color cpu"></div>
                                <span>CPU</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color gpu"></div>
                                <span>GPU</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color fps"></div>
                                <span>FPS</span>
                            </div>
                        </div>
                    </div>
                    <div class="graph-canvas">
                        <div class="grid-lines"></div>
                        <div class="graph-line cpu-line"></div>
                        <div class="graph-line gpu-line"></div>
                        <div class="graph-line fps-line"></div>
                    </div>
                </div>

                <!-- Frame Time Section -->
                <div class="frame-time-panel">
                    <div class="section-header">
                        <span class="section-icon">⏱️</span>
                        <span class="section-title">フレームタイム監視</span>
                    </div>
                    <div class="frame-time-info">
                        <div class="frame-time-stat">
                            <div class="frame-time-label">Average</div>
                            <div class="frame-time-value">6.94ms</div>
                        </div>
                        <div class="frame-time-stat">
                            <div class="frame-time-label">1% Low</div>
                            <div class="frame-time-value">10.2ms</div>
                        </div>
                        <div class="frame-time-stat">
                            <div class="frame-time-label">0.1% Low</div>
                            <div class="frame-time-value">15.8ms</div>
                        </div>
                    </div>
                    <button class="monitor-btn active">監視中</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
