name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run check
      - run: npm run test

  rust:
    name: Rust
    runs-on: windows-latest   # winreg / Windows API を使うため Windows 必須
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri
      - name: cargo test
        working-directory: src-tauri
        run: cargo test
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
      - name: cargo fmt check
        working-directory: src-tauri
        run: cargo fmt -- --check