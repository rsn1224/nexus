name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run check
      - run: npm run lint
      - run: npm run test

  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev pkg-config libssl-dev libgtk-3-dev
      - name: cargo fmt check
        working-directory: src-tauri
        run: cargo fmt -- --check
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  rust-test-linux:
    name: Rust Test (Linux)
    runs-on: ubuntu-latest
    needs: rust-lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev pkg-config libssl-dev libgtk-3-dev
      - name: cargo test
        working-directory: src-tauri
        run: cargo test

  rust-test-windows:
    name: Rust Test (Windows)
    runs-on: windows-latest
    # Cost reduction: Only run on manual trigger or [win-test] tag
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[win-test]'))
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        working-directory: src-tauri
        run: cargo test
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # npm audit
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

      # cargo audit
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit

  e2e:
    name: E2E Tests
    runs-on: windows-latest
    # Cost reduction: Only run on manual trigger or [win-test] tag
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[win-test]'))
    continue-on-error: true  # 初期は失敗しても CI 全体はブロックしない
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Build Tauri app
        run: npm run tauri build -- --debug
      - name: Run E2E tests
        run: npx playwright test